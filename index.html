<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production 1 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 900px; margin: auto; margin-bottom: 20px; }
        .header { background: #1a2a6c; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>DAILY ACTIVITY MONITORING</h2>
        <p>M RIVALDI EKA SATRIA | PRODUCTION 1</p>
    </div>
    <div id="loader" style="text-align:center; padding:20px;">Menyaring data kosong...</div>
    <canvas id="chartSuhu"></canvas>
</div>

<script>
    const apiURL = "https://script.google.com/macros/s/AKfycbx8zA7oTztaAwm-o1jtecDFbwiovftMBsSxatcQiPdw6uNiNvPyMThTgOedRxi0OHj6FA/exec";

    async function loadData() {
        try {
            const response = await fetch(apiURL);
            const allData = await response.json();
            document.getElementById('loader').style.display = 'none';

            // MENGAMBIL TAB "Average Temp"
            const key = "Average Temp";
            const rawData = allData[key];

            // PROSES MEMBERSIHKAN DATA (Membuang baris kosong)
            const cleanData = rawData.filter(row => {
                const nilai = Object.values(row)[1]; 
                return nilai !== "" && nilai !== null && nilai !== 0;
            }).slice(-14); // Ambil 14 hari terakhir yang ada isinya

            new Chart(document.getElementById('chartSuhu'), {
                type: 'line',
                data: {
                    labels: cleanData.map(d => Object.values(d)[0]), // Ambil Tanggal
                    datasets: [{
                        label: 'Suhu Rata-rata (°C)',
                        data: cleanData.map(d => parseFloat(Object.values(d)[1])), // Ambil Angka Suhu
                        borderColor: '#e74c3c',
                        backgroundColor: 'rgba(231, 76, 60, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    scales: {
                        y: { 
                            // Mengatur agar skala suhu sesuai dengan data Cold Storage (-20an)
                            reverse: false 
                        }
                    }
                }
            });

        } catch (e) {
            document.getElementById('loader').innerText = "Gagal memuat. Periksa koneksi.";
        }
    }
    loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production 1 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { background: #1a2a6c; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h3 { margin-top: 0; color: #333; font-size: 16px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .loading { text-align: center; font-weight: bold; color: #1a2a6c; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">DAILY ACTIVITY MONITORING</h2>
        <p style="margin:5px 0 0;">M RIVALDI EKA SATRIA | PRODUCTION 1</p>
    </div>

    <div id="loader" class="loading">Sinkronisasi Data Cold Storage...</div>

    <div class="card">
        <h3>Average Temperature (°C)</h3>
        <canvas id="chartSuhu"></canvas>
    </div>

    <div class="card">
        <h3>Hour Meter (HM) Monitoring</h3>
        <canvas id="chartHM"></canvas>
    </div>
</div>

<script>
    const apiURL = "https://script.google.com/macros/s/AKfycbx8zA7oTztaAwm-o1jtecDFbwiovftMBsSxatcQiPdw6uNiNvPyMThTgOedRxi0OHj6FA/exec";

    async function loadDashboard() {
        try {
            const response = await fetch(apiURL);
            const allData = await response.json();
            document.getElementById('loader').style.display = 'none';

            // 1. PROSES DATA SUHU
            const dataSuhu = allData["Average Temp"].filter(row => {
                const val = Object.values(row)[1];
                return val !== "" && val !== null && val !== 0;
            }).slice(-14);

            renderChart('chartSuhu', 
                dataSuhu.map(d => Object.values(d)[0]), 
                dataSuhu.map(d => parseFloat(Object.values(d)[1])), 
                'Suhu (°C)', '#e74c3c');

            // 2. PROSES DATA HM
            const dataHM = allData["HM & Ampere Average"].filter(row => {
                const val = Object.values(row)[1];
                return val !== "" && val !== null && val !== 0;
            }).slice(-14);

            renderChart('chartHM', 
                dataHM.map(d => Object.values(d)[0]), 
                dataHM.map(d => parseFloat(Object.values(d)[1])), 
                'Running Hours (HM)', '#3498db');

        } catch (e) {
            document.getElementById('loader').innerText = "Gagal memuat. Periksa koneksi atau Izin Apps Script.";
        }
    }

    function renderChart(id, labels, values, title, color) {
        new Chart(document.getElementById(id), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: title,
                    data: values,
                    borderColor: color,
                    backgroundColor: color + '11',
                    fill: true,
                    tension: 0.3,
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: false } }
            }
        });
    }

    loadDashboard();
</script>
</body>
</html>

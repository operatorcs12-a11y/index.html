<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production 1 - Cold Storage</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 900px; margin: auto; margin-bottom: 20px; }
        .header { background: #1a2a6c; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        h2, p { margin: 5px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>DAILY ACTIVITY MONITORING</h2>
        <p>M RIVALDI EKA SATRIA | PRODUCTION 1</p>
    </div>
    <div id="loader" style="text-align:center;">Menghubungkan ke Cold Storage...</div>
    <canvas id="chartSuhu"></canvas>
</div>

<div class="card">
    <h3>Hour Meter (HM) Monitoring</h3>
    <canvas id="chartHM"></canvas>
</div>

<script>
    const apiURL = "https://script.google.com/macros/s/AKfycbz3f0Djh8GLR8UhXp1XaheGnYZFiWL5wvo8NVIHOE5ZoVt7pqSAE_CbgN692qvoGOfIKg/exec";

    async function getData() {
        try {
            const response = await fetch(apiURL);
            const allData = await response.json();
            document.getElementById('loader').style.display = 'none';

            // 1. Ambil data Tab Average Temp (Otomatis ambil kolom A & B)
            const keyTemp = Object.keys(allData).find(k => k.trim().toLowerCase() === "average temp");
            const dataTemp = allData[keyTemp].slice(-10); // 10 data terakhir
            
            renderChart('chartSuhu', 
                dataTemp.map(d => Object.values(d)[0]), // Ambil isi kolom pertama (Tanggal)
                dataTemp.map(d => Object.values(d)[1]), // Ambil isi kolom kedua (Suhu)
                'Average Temp (°C)', '#e74c3c');

            // 2. Ambil data Tab HM (Otomatis ambil kolom A & B)
            const keyHM = Object.keys(allData).find(k => k.trim().toLowerCase() === "hm & ampere average");
            const dataHM = allData[keyHM].slice(-10);
            
            renderChart('chartHM', 
                dataHM.map(d => Object.values(d)[0]), // Tanggal
                dataHM.map(d => Object.values(d)[1]), // HM
                'Running Hours (HM)', '#3498db');

        } catch (e) {
            document.getElementById('loader').innerText = "Gagal memuat data. Cek Izin Anyone di Apps Script.";
        }
    }

    function renderChart(id, labels, values, labelName, color) {
        new Chart(document.getElementById(id), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: labelName,
                    data: values,
                    borderColor: color,
                    backgroundColor: color + '22',
                    fill: true,
                    tension: 0.3
                }]
            }
        });
    }

    getData();
</script>
</body>
</html>

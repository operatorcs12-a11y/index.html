<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production 1 - Compressor Detail</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .header { background: #1a2a6c; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        .comp-section { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .comp-title { font-size: 20px; font-weight: bold; color: #1a2a6c; border-bottom: 3px solid #1a2a6c; padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        h3 { margin-top: 0; font-size: 13px; color: #555; text-transform: uppercase; }
        .loading { text-align: center; font-weight: bold; color: #1a2a6c; padding: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">DETAILED COMPRESSOR MONITORING</h2>
        <p style="margin:5px 0 0;">M RIVALDI EKA SATRIA | PRODUCTION 1</p>
    </div>

    <div id="loader" class="loading">Menghubungkan ke Database Compressor...</div>

    <div class="comp-section" id="section-comp1" style="display:none;">
        <div class="comp-title">UNIT COMPRESSOR 1 (Kolom B-K)</div>
        <div class="grid" id="grid-comp1"></div>
    </div>
</div>

<script>
    const apiURL = "https://script.google.com/macros/s/AKfycbx8zA7oTztaAwm-o1jtecDFbwiovftMBsSxatcQiPdw6uNiNvPyMThTgOedRxi0OHj6FA/exec";

    async function init() {
        try {
            const response = await fetch(apiURL);
            const data = await response.json();
            document.getElementById('loader').style.display = 'none';

            // Nama Tab (Sesuaikan dengan nama tab di Sheet Bapak)
            const tabName = "Average Pressure CS"; 
            const sheetData = data[tabName];

            if(sheetData) {
                document.getElementById('section-comp1').style.display = 'block';
                const last10 = sheetData.filter(row => Object.values(row)[1] !== "").slice(-10);
                const tgl = last10.map(d => String(Object.values(d)[0]).split('T')[0]);

                // PEMETAAN KOLOM B SAMPAI K (Indeks 1 sampai 10)
                // Bapak bisa ganti Label di bawah ini sesuai judul kolom asli Bapak
                const configComp1 = [
                    { idx: 1, label: "Suction Pressure", unit: " Bar", color: "#3498db" },
                    { idx: 2, label: "Discharge Pressure", unit: " Bar", color: "#e74c3c" },
                    { idx: 3, label: "Oil Pressure", unit: " Bar", color: "#f1c40f" },
                    { idx: 4, label: "Oil Temp In", unit: " °C", color: "#e67e22" },
                    { idx: 5, label: "Oil Temp Out", unit: " °C", color: "#d35400" },
                    { idx: 6, label: "Discharge Temp", unit: " °C", color: "#c0392b" },
                    { idx: 7, label: "Suction Temp", unit: " °C", color: "#2980b9" },
                    { idx: 8, label: "Ampere", unit: " A", color: "#27ae60" },
                    { idx: 9, label: "Slide Valve", unit: " %", color: "#8e44ad" },
                    { idx: 10, label: "HM Running", unit: " Hrs", color: "#2c3e50" }
                ];

                renderCharts(configComp1, "grid-comp1", last10, tgl);
            }
        } catch (e) {
            document.getElementById('loader').innerText = "Gagal memuat. Cek Tab 'Average Pressure CS'";
        }
    }

    function renderCharts(configs, containerId, rawData, labels) {
        const container = document.getElementById(containerId);
        configs.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            const canvasId = `chart_${containerId}_${item.idx}`;
            card.innerHTML = `<h3>${item.label}</h3><canvas id="${canvasId}"></canvas>`;
            container.appendChild(card);

            new Chart(document.getElementById(canvasId), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: item.label,
                        data: rawData.map(d => parseFloat(Object.values(d)[item.idx]) || 0),
                        borderColor: item.color,
                        backgroundColor: item.color + '11',
                        fill: true, tension: 0.3, borderWidth: 2, pointRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { callback: v => v + item.unit } },
                        x: { ticks: { display: false } } // Sembunyikan tgl agar tidak sesak
                    }
                }
            });
        });
    }
    init();
</script>
</body>
</html>
